---
# =============================================================================
# OpenClaw Air-Gap Deployment Playbook
# =============================================================================
# Usage:
#   ansible-playbook deploy.yml \
#     -i "airgap-host.local," \
#     -e "bundle_src=/tmp/openclaw-airgap-bundle" \
#     -e "agent_user=openclaw" \
#     -e "server_hostname=ai.internal" \
#     -e "llm_model=qwen2.5:14b" \
#     --ask-become-pass
#
# Requirements on control node:
#   - Ansible 2.14+
#   - Bundle tarball or extracted directory available
# =============================================================================

- name: OpenClaw Air-Gap Deployment
  hosts: all
  become: true
  vars:
    agent_user:      "openclaw"
    server_hostname: "{{ inventory_hostname }}"
    llm_model:       "qwen2.5:14b"
    oc_home:         "/opt/openclaw"
    oc_config:       "/opt/openclaw/.openclaw"
    oc_workspace:    "/opt/openclaw/workspace"
    ollama_home:     "/opt/ollama"
    mm_home:         "/opt/mattermost"
    n8n_home:        "/opt/n8n"
    bundle_src:      "/tmp/openclaw-airgap-bundle"
    node_version:    "22"
    pg_data:         "/var/lib/pgsql/16/data"

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true

    - name: restart openclaw
      systemd:
        name: openclaw
        state: restarted
      ignore_errors: true

    - name: restart mattermost
      systemd:
        name: mattermost
        state: restarted
      ignore_errors: true

    - name: restart n8n
      systemd:
        name: n8n
        state: restarted
      ignore_errors: true

  tasks:

    # ── Preflight ─────────────────────────────────────────────────────────────
    - name: Verify bundle exists on target
      stat:
        path: "{{ bundle_src }}/MANIFEST.txt"
      register: bundle_check
      failed_when: not bundle_check.stat.exists

    - name: Print manifest
      command: cat "{{ bundle_src }}/MANIFEST.txt"
      register: manifest
      changed_when: false
    - debug:
        var: manifest.stdout_lines

    # ── Local YUM repo ─────────────────────────────────────────────────────────
    - name: Set up local RPM repo
      copy:
        dest: /etc/yum.repos.d/openclaw-local.repo
        content: |
          [openclaw-local]
          name=OpenClaw Local Bundle
          baseurl=file://{{ bundle_src }}/rpms
          enabled=1
          gpgcheck=0

    - name: Install RPM packages
      dnf:
        name:
          - nodejs
          - git
          - gcc
          - gcc-c++
          - make
          - python3
          - python3-pip
          - python3-devel
          - postgresql16-server
          - postgresql16
          - redis
          - firewalld
          - jq
          - openssl
        state: present
        disablerepo: "*"
        enablerepo: "openclaw-local"

    - name: Validate Node.js installation
      command: node --version
      register: node_version_result
      changed_when: false
      failed_when: node_version_result.rc != 0

    - name: Show Node.js version
      debug:
        msg: "Node.js {{ node_version_result.stdout }}"

    # ── pnpm ──────────────────────────────────────────────────────────────────
    - name: Check pnpm binary exists and is ELF
      stat:
        path: "{{ bundle_src }}/binaries/pnpm"
      register: pnpm_stat

    - name: Install pnpm binary
      copy:
        src: "{{ bundle_src }}/binaries/pnpm"
        dest: /usr/local/bin/pnpm
        mode: "0755"
        remote_src: true
      when: pnpm_stat.stat.exists

    # ── System users ──────────────────────────────────────────────────────────
    - name: Create agent user
      user:
        name: "{{ agent_user }}"
        home: "{{ oc_home }}"
        shell: /bin/bash
        system: false
        create_home: true

    - name: Create ollama user
      user:
        name: ollama
        home: "{{ ollama_home }}"
        shell: /bin/false
        system: true
        create_home: true

    - name: Create mattermost user
      user:
        name: mattermost
        home: "{{ mm_home }}"
        shell: /bin/false
        system: true
        create_home: true

    # ── Directories ───────────────────────────────────────────────────────────
    - name: Create workspace directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_user }}"
        mode: "0755"
      loop:
        - "{{ oc_config }}"
        - "{{ oc_workspace }}"
        - "{{ oc_workspace }}/skills"
        - "{{ oc_workspace }}/memory"
        - "{{ oc_workspace }}/tasks"
        - "{{ oc_workspace }}/voice-inbox"
        - "{{ oc_home }}/backups"
        - /var/log/openclaw
        - /opt/openclaw-modules
        - /opt/n8n-modules
        - /etc/openclaw

    # ── OpenClaw ──────────────────────────────────────────────────────────────
    - name: Extract OpenClaw node_modules
      unarchive:
        src: "{{ bundle_src }}/node-packages/openclaw-node_modules.tar.gz"
        dest: /opt/openclaw-modules
        remote_src: true
        creates: /opt/openclaw-modules/node_modules/openclaw

    - name: Create openclaw CLI wrapper
      copy:
        dest: /usr/local/bin/openclaw
        mode: "0755"
        content: |
          #!/bin/bash
          exec node /opt/openclaw-modules/node_modules/.bin/openclaw "$@"

    - name: Deploy openclaw.json config
      copy:
        dest: "{{ oc_config }}/openclaw.json"
        owner: "{{ agent_user }}"
        group: "{{ agent_user }}"
        mode: "0640"
        remote_src: true
        src: "{{ bundle_src }}/configs/openclaw.json"
      notify: restart openclaw

    - name: Substitute variables in openclaw.json
      replace:
        path: "{{ oc_config }}/openclaw.json"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { regexp: '__SERVER_HOSTNAME__', replace: '{{ server_hostname }}' }
        - { regexp: '__WORKSPACE__',       replace: '{{ oc_workspace }}' }
        - { regexp: '__MODEL__',           replace: '{{ llm_model }}' }
        - { regexp: '"host": "0\.0\.0\.0"', replace: '"host": "127.0.0.1"' }
      notify: restart openclaw

    - name: Deploy identity files (do not overwrite if customized)
      copy:
        src: "{{ item }}"
        dest: "{{ oc_workspace }}/{{ item | basename }}"
        owner: "{{ agent_user }}"
        group: "{{ agent_user }}"
        mode: "0644"
        force: false
      with_fileglob:
        - "{{ bundle_src }}/configs/identity/*.md"

    - name: Deploy HEARTBEAT.md
      copy:
        src: "{{ bundle_src }}/configs/HEARTBEAT.md"
        dest: "{{ oc_workspace }}/HEARTBEAT.md"
        owner: "{{ agent_user }}"
        group: "{{ agent_user }}"
        mode: "0644"
        force: false

    # ── Ollama ────────────────────────────────────────────────────────────────
    - name: Check for Ollama tgz
      stat:
        path: "{{ bundle_src }}/binaries/ollama-linux-amd64.tgz"
      register: ollama_tgz

    - name: Extract Ollama tgz to temp dir
      unarchive:
        src: "{{ bundle_src }}/binaries/ollama-linux-amd64.tgz"
        dest: /tmp/ollama-extract
        remote_src: true
        creates: /tmp/ollama-extract
      when: ollama_tgz.stat.exists

    - name: Install Ollama binary from extracted archive
      shell: |
        find /tmp/ollama-extract -name "ollama" -type f -exec install -m 755 {} /usr/local/bin/ollama \; 2>/dev/null | head -1
      args:
        creates: /usr/local/bin/ollama
      when: ollama_tgz.stat.exists

    - name: Check for Ollama single binary
      stat:
        path: "{{ bundle_src }}/binaries/ollama"
      register: ollama_bin

    - name: Install Ollama single binary
      copy:
        src: "{{ bundle_src }}/binaries/ollama"
        dest: /usr/local/bin/ollama
        mode: "0755"
        remote_src: true
      when: ollama_bin.stat.exists and not ollama_tgz.stat.exists

    - name: Restore Ollama models
      unarchive:
        src: "{{ bundle_src }}/models/ollama-models.tar.gz"
        dest: "{{ ollama_home }}"
        remote_src: true
        owner: ollama
        group: ollama
        creates: "{{ ollama_home }}/models"

    # ── PostgreSQL ────────────────────────────────────────────────────────────
    - name: Initialize PostgreSQL
      command: postgresql16-setup initdb
      args:
        creates: "{{ pg_data }}/PG_VERSION"

    - name: Enable and start PostgreSQL
      systemd:
        name: postgresql-16
        enabled: true
        state: started

    - name: Wait for PostgreSQL to be ready
      command: pg_isready
      register: pg_ready
      until: pg_ready.rc == 0
      retries: 30
      delay: 1
      changed_when: false

    - name: Generate Mattermost DB password
      set_fact:
        mm_db_pass: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Save Mattermost DB credentials
      copy:
        dest: /root/.mattermost-db-creds
        mode: "0600"
        content: |
          DB_USER=mmuser
          DB_PASS={{ mm_db_pass }}
          DB_NAME=mattermost

    - name: Create Mattermost PostgreSQL user
      become_user: postgres
      community.postgresql.postgresql_user:
        name: mmuser
        password: "{{ mm_db_pass }}"
      ignore_errors: false

    - name: Create Mattermost database
      become_user: postgres
      community.postgresql.postgresql_db:
        name: mattermost
        owner: mmuser
      ignore_errors: false

    # ── Mattermost ────────────────────────────────────────────────────────────
    - name: Find Mattermost archive
      find:
        paths: "{{ bundle_src }}/mattermost"
        patterns: "*.tar.gz"
      register: mm_archive

    - name: Extract Mattermost
      unarchive:
        src: "{{ mm_archive.files[0].path }}"
        dest: "{{ mm_home }}"
        remote_src: true
        owner: mattermost
        group: mattermost
        extra_opts: ["--strip-components=1"]
        creates: "{{ mm_home }}/bin/mattermost"
      when: mm_archive.files | length > 0
      notify: restart mattermost

    - name: Write Mattermost config (Python for safe JSON)
      shell: |
        python3 - << 'PYJSON'
        import json
        cfg = {
          "ServiceSettings": {
            "SiteURL": "http://{{ server_hostname }}:8065",
            "ListenAddress": ":8065",
            "ConnectionSecurity": "",
            "EnableBotAccountCreation": True,
            "EnableAPIv3": False
          },
          "SqlSettings": {
            "DriverName": "postgres",
            "DataSource": "postgres://mmuser:{{ mm_db_pass }}@localhost:5432/mattermost?sslmode=disable",
            "MaxIdleConns": 10,
            "MaxOpenConns": 100,
            "Trace": False
          },
          "TeamSettings": {
            "SiteName": "OpenClaw AI",
            "MaxUsersPerTeam": 50,
            "EnableTeamCreation": False,
            "EnableUserCreation": True
          },
          "EmailSettings": {
            "SendEmailNotifications": False,
            "EnableSignUpWithEmail": True,
            "RequireEmailVerification": False
          },
          "FileSettings": {"MaxFileSize": 104857600},
          "LogSettings": {
            "EnableConsole": True,
            "ConsoleLevel": "INFO",
            "EnableFile": True,
            "FileLevel": "WARN",
            "FileLocation": "/var/log/openclaw/mattermost.log"
          }
        }
        with open("{{ mm_home }}/config/config.json", "w") as f:
            json.dump(cfg, f, indent=2)
        print("Mattermost config written.")
        PYJSON
      args:
        # NOTE: `creates` makes this task idempotent on fresh deploys, but it
        # will NOT re-apply if config.json already exists (e.g. after a hostname
        # change).  To force a config refresh, delete the file first or use
        # `--extra-vars "force_mm_config=true"` and remove this guard.
        creates: "{{ mm_home }}/config/config.json"
      when: mm_archive.files | length > 0
      notify: restart mattermost

    # ── n8n ───────────────────────────────────────────────────────────────────
    - name: Extract n8n node_modules
      unarchive:
        src: "{{ bundle_src }}/node-packages/n8n-node_modules.tar.gz"
        dest: /opt/n8n-modules
        remote_src: true
        creates: /opt/n8n-modules/node_modules/.bin/n8n

    - name: Create n8n CLI wrapper
      copy:
        dest: /usr/local/bin/n8n
        mode: "0755"
        content: |
          #!/bin/bash
          exec node /opt/n8n-modules/node_modules/.bin/n8n "$@"

    - name: Generate n8n password
      set_fact:
        n8n_pass: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Write n8n env file
      copy:
        dest: /etc/openclaw/n8n.env
        mode: "0600"
        content: |
          N8N_BASIC_AUTH_PASSWORD={{ n8n_pass }}
      notify: restart n8n

    # ── Whisper ───────────────────────────────────────────────────────────────
    - name: Install faster-whisper
      pip:
        name: faster-whisper
        extra_args: "--no-index --find-links={{ bundle_src }}/python-wheels/"
        state: present
      ignore_errors: true

    # ── logrotate ─────────────────────────────────────────────────────────────
    - name: Deploy logrotate config
      copy:
        src: "{{ bundle_src }}/configs/logrotate/openclaw"
        dest: /etc/logrotate.d/openclaw
        mode: "0644"
        remote_src: true
      ignore_errors: true

    # ── Systemd services ──────────────────────────────────────────────────────
    - name: Deploy systemd service files
      copy:
        dest: "/etc/systemd/system/{{ item }}.service"
        remote_src: true
        src: "{{ bundle_src }}/configs/systemd/{{ item }}.service"
      loop: [ollama, openclaw, mattermost, n8n]
      notify: reload systemd

    - name: Substitute variables in service files
      replace:
        path: "/etc/systemd/system/{{ item.svc }}.service"
        regexp: "{{ item.regexp }}"
        replace: "{{ item.replace }}"
      loop:
        - { svc: ollama,      regexp: '__AGENT_USER__',  replace: '{{ agent_user }}' }
        - { svc: ollama,      regexp: '__OLLAMA_HOME__', replace: '{{ ollama_home }}' }
        - { svc: openclaw,    regexp: '__AGENT_USER__',  replace: '{{ agent_user }}' }
        - { svc: openclaw,    regexp: '__OC_HOME__',     replace: '{{ oc_home }}' }
        - { svc: openclaw,    regexp: '__OC_CONFIG__',   replace: '{{ oc_config }}' }
        - { svc: mattermost,  regexp: '__MM_HOME__',     replace: '{{ mm_home }}' }
        - { svc: n8n,         regexp: '__AGENT_USER__',  replace: '{{ agent_user }}' }
        - { svc: n8n,         regexp: '__N8N_HOME__',    replace: '{{ n8n_home }}' }
      notify: reload systemd

    - name: Reload systemd daemon
      systemd:
        daemon_reload: true

    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        daemon_reload: false
      loop:
        - postgresql-16
        - ollama
        - mattermost
        - n8n
        - openclaw

    # ── Firewall ──────────────────────────────────────────────────────────────
    - name: Enable firewalld
      systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Open required ports
      # NOTE: The OpenClaw gateway (18789) is intentionally omitted here.
      # It binds to 127.0.0.1 by default and should never be exposed to the
      # network.  If you change gateway.host in openclaw.json to a LAN IP,
      # add a source-restricted firewalld rich rule instead of opening the
      # port broadly.  See docs/SECURITY.md for the recommended rich-rule.
      firewalld:
        port: "{{ item }}"
        state: enabled
        permanent: true
        immediate: true
      loop:
        - "8065/tcp"    # Mattermost
        - "5678/tcp"    # n8n
        - "3001/tcp"    # Mission Control

# ── Verification play ─────────────────────────────────────────────────────────
- name: Verify OpenClaw Deployment
  hosts: all
  become: true
  tasks:

    - name: Wait for Ollama to respond
      uri:
        url: "http://localhost:11434/api/tags"
        method: GET
        status_code: 200
        timeout: 10
      register: ollama_check
      retries: 12
      delay: 5
      until: ollama_check.status == 200
      changed_when: false

    - name: Wait for Mattermost to respond
      uri:
        url: "http://localhost:8065/api/v4/system/ping"
        method: GET
        status_code: 200
        timeout: 10
      register: mm_check
      retries: 18
      delay: 5
      until: mm_check.status == 200
      changed_when: false

    - name: Wait for n8n to respond
      uri:
        url: "http://localhost:5678/healthz"
        method: GET
        status_code: 200
        timeout: 10
      register: n8n_check
      retries: 12
      delay: 5
      until: n8n_check.status == 200
      changed_when: false

    - name: Wait for OpenClaw to respond
      uri:
        url: "http://localhost:18789/health"
        method: GET
        status_code: 200
        timeout: 10
      register: oc_check
      retries: 12
      delay: 5
      until: oc_check.status == 200
      changed_when: false
      ignore_errors: true

    - name: Verify all services are active
      command: "systemctl is-active {{ item }}"
      loop:
        - postgresql-16
        - ollama
        - mattermost
        - n8n
        - openclaw
      changed_when: false
      register: svc_status

    - name: Show service status summary
      debug:
        msg: "{{ item.item }}: {{ item.stdout }}"
      loop: "{{ svc_status.results }}"

    - name: Deployment complete
      debug:
        msg:
          - "OpenClaw deployment complete."
          - "Mattermost: http://{{ inventory_hostname }}:8065"
          - "n8n:        http://{{ inventory_hostname }}:5678"
          - "OpenClaw:   http://{{ inventory_hostname }}:18789"
          - "n8n password: /etc/openclaw/n8n.env"
          - "Next: Create Mattermost admin + bot account, then run openclaw-configure-mattermost <TOKEN>"
